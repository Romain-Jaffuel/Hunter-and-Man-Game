<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chasseur & Bonhomme</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --panel: #111820;
    --border: #1e3a4a;
    --accent: #00d4ff;
    --accent2: #ff4060;
    --accent3: #00ff88;
    --gold: #ffd700;
    --text: #c8e6f0;
    --muted: #4a6a7a;
    --cell: #0d1a24;
    --cell-border: #1a2e3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,64,96,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1100px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 10px 0;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2);
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    margin-top: 4px;
  }

  /* Main layout */
  .main-layout {
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    gap: 16px;
    width: 100%;
    align-items: start;
  }

  @media (max-width: 700px) {
    .main-layout { grid-template-columns: 1fr; }
    .side-panel { display: none; }
  }

  /* Panel */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Energy bars */
  .entity {
    margin-bottom: 16px;
  }

  .entity-name {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .entity-name.player { color: var(--accent3); }
  .entity-name.hunter { color: var(--accent2); }

  .energy-bar {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .energy-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .energy-fill.player { background: linear-gradient(90deg, #00cc77, #00ff88); box-shadow: 0 0 8px rgba(0,255,136,0.5); }
  .energy-fill.hunter { background: linear-gradient(90deg, #cc2040, #ff4060); box-shadow: 0 0 8px rgba(255,64,96,0.5); }

  .energy-value {
    font-size: 1.4rem;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    margin-top: 4px;
  }
  .energy-value.player { color: var(--accent3); }
  .energy-value.hunter { color: var(--accent2); }

  /* Turn counter */
  .turn-display {
    text-align: center;
    padding: 10px 0;
  }

  .turn-number {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .turn-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.3em;
  }

  /* Grid */
  .grid-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 3px;
    padding: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
  }

  .grid::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .cell {
    width: clamp(38px, 8vw, 58px);
    height: clamp(38px, 8vw, 58px);
    background: var(--cell);
    border: 1px solid var(--cell-border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1rem, 2vw, 1.4rem);
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .cell.player {
    background: rgba(0,255,136,0.1);
    border-color: var(--accent3);
    box-shadow: 0 0 12px rgba(0,255,136,0.3), inset 0 0 12px rgba(0,255,136,0.05);
    animation: pulse-player 1.5s ease-in-out infinite;
  }

  .cell.hunter {
    background: rgba(255,64,96,0.1);
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(255,64,96,0.3), inset 0 0 12px rgba(255,64,96,0.05);
    animation: pulse-hunter 1s ease-in-out infinite;
  }

  .cell.target {
    background: rgba(255,215,0,0.08);
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(255,215,0,0.25);
  }

  .cell.item-bonus {
    background: rgba(0,212,255,0.06);
    border-color: rgba(0,212,255,0.4);
  }

  .cell.item-malus {
    background: rgba(255,100,0,0.06);
    border-color: rgba(255,100,0,0.4);
  }
  
  .cell.item-feu {
      background: rgba(255,80,0,0.08);
      border-color: rgba(255,80,0,0.5);
  }
  .cell.item-fruits {
      background: rgba(0,200,80,0.08);
      border-color: rgba(0,200,80,0.5);
  }
  .cell.item-predateur {
      background: rgba(180,0,255,0.08);
      border-color: rgba(180,0,255,0.5);
  }

  @keyframes pulse-player {
    0%, 100% { box-shadow: 0 0 12px rgba(0,255,136,0.3); }
    50% { box-shadow: 0 0 20px rgba(0,255,136,0.6); }
  }
  @keyframes pulse-hunter {
    0%, 100% { box-shadow: 0 0 12px rgba(255,64,96,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,64,96,0.7); }
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1px solid;
  }

  /* Log */
  .log {
    max-height: 140px;
    overflow-y: auto;
    font-size: 0.68rem;
    line-height: 1.8;
    color: var(--muted);
  }

  .log::-webkit-scrollbar { width: 3px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-entry { border-left: 2px solid var(--border); padding-left: 8px; margin-bottom: 2px; transition: all 0.3s; }
  .log-entry.new { border-left-color: var(--accent); color: var(--text); }
  .log-entry.danger { border-left-color: var(--accent2); color: #ff8090; }
  .log-entry.success { border-left-color: var(--accent3); color: #80ffbb; }
  .log-entry.warn { border-left-color: var(--gold); color: #ffd700; }

  /* Controls hint */
  .controls-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.5;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .arrow-keys {
    display: grid;
    grid-template-columns: repeat(3, 28px);
    grid-template-rows: repeat(2, 28px);
    gap: 3px;
  }

  .key {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--text);
  }

  .key.up { grid-column: 2; }
  .key.left { grid-column: 1; grid-row: 2; }
  .key.down { grid-column: 2; grid-row: 2; }
  .key.right { grid-column: 3; grid-row: 2; }
  .key.active { background: rgba(0,212,255,0.2); border-color: var(--accent); color: var(--accent); }

  /* Start button */
  .btn-start {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-start:hover {
    background: rgba(0,212,255,0.1);
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
  }

  /* Game over overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,12,16,0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .overlay.show { display: flex; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    text-align: center;
  }

  .overlay-title.defeat { color: var(--accent2); text-shadow: 0 0 40px rgba(255,64,96,0.5); }
  .overlay-title.victory { color: var(--accent3); text-shadow: 0 0 40px rgba(0,255,136,0.5); }

  .overlay-msg {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="title">Chasseur &amp; Bonhomme</div>
    
  </header>

  <div class="main-layout">

    <!-- Left panel -->
    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Statut</div>

        <div class="entity">
          <div class="entity-name player">
            <span>⬟ BONHOMME</span>
          </div>
          <div class="energy-bar">
            <div class="energy-fill player" id="player-bar" style="width:100%"></div>
          </div>
          <div class="energy-value player" id="player-energy">100</div>
        </div>

        <div class="entity">
          <div class="entity-name hunter">
            <span>⬛ CHASSEUR</span>
          </div>
          <div class="energy-bar">
            <div class="energy-fill hunter" id="hunter-bar" style="width:100%"></div>
          </div>
          <div class="energy-value hunter" id="hunter-energy">100</div>
        </div>

        <div class="turn-display">
          <div class="turn-number" id="turn-display">0</div>
          <div class="turn-label">TOUR</div>
        </div>

        <div style="text-align:center; margin-top:8px;">
          <button class="btn-start" onclick="restartGame()">↺ RESTART</button>
        </div>
      </div>
    </div>

    <!-- Grid center -->
    <div class="grid-wrapper">
      <div class="grid" id="grid"></div>

	  <div class="legend">
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(0,255,136,0.2);border-color:#00ff88"></div>
	          <span>Bonhomme</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(255,64,96,0.2);border-color:#ff4060"></div>
	          <span>Chasseur</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(255,215,0,0.1);border-color:#ffd700"></div>
	          <span>Cible ✦</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.5)"></div>
	          <span>Bonus 💊</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(255,100,0,0.1);border-color:rgba(255,100,0,0.5)"></div>
	          <span>Malus ☠</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(255,80,0,0.1);border-color:rgba(255,80,0,0.5)"></div>
	          <span>Feu 🔥</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(0,200,80,0.1);border-color:rgba(0,200,80,0.5)"></div>
	          <span>Fruits 🍎</span>
	      </div>
	      <div class="legend-item">
	          <div class="legend-dot" style="background:rgba(180,0,255,0.1);border-color:rgba(180,0,255,0.5)"></div>
	          <span>Prédateur 🐺</span>
	      </div>
	  </div>

      <div class="controls-hint">
        <div class="arrow-keys">
          <div class="key up" id="key-n">↑</div>
          <div class="key left" id="key-w">←</div>
          <div class="key down" id="key-s">↓</div>
          <div class="key right" id="key-e">→</div>
        </div>
        <span>flèches pour se déplacer</span>
      </div>
    </div>

    <!-- Right panel -->
    <div class="side-panel">
      <div class="panel">
        <div class="panel-title">Journal</div>
        <div class="log" id="log"></div>
      </div>
    </div>

  </div>
</div>

<!-- Game over overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-title" id="overlay-title">GAME OVER</div>
  <div class="overlay-msg" id="overlay-msg">Message</div>
  <button class="btn-start" onclick="restartGame()">↺ REJOUER</button>
</div>

<script>
const API = '/game';
let prevPlayerEnergy = 100;
let prevHunterEnergy = 100;
let gameActive = false;

const keyMap = {
  'ArrowUp':    'N',
  'ArrowDown':  'S',
  'ArrowLeft':  'W',
  'ArrowRight': 'E',
};

const keyIds = { N: 'key-n', S: 'key-s', W: 'key-w', E: 'key-e' };

async function startGame() {
  await fetch(`${API}/start`, { method: 'POST' });
  gameActive = true;
  prevPlayerEnergy = 100;
  prevHunterEnergy = 100;
  document.getElementById('log').innerHTML = '';
  document.getElementById('overlay').classList.remove('show');
  addLog('Partie démarrée. Utilisez les flèches.', 'new');
  await fetchState();
}

async function restartGame() {
  await startGame();
}

async function move(direction) {
  if (!gameActive) return;

  // Flash key
  const keyEl = document.getElementById(keyIds[direction]);
  if (keyEl) {
    keyEl.classList.add('active');
    setTimeout(() => keyEl.classList.remove('active'), 150);
  }

  const res = await fetch(`${API}/move/${direction}`, { method: 'POST' });
  const text = await res.text();
  if (text === 'Invalid direction') {
    addLog('Mouvement invalide', 'warn');
    return;
  }
  await fetchState();
}

async function fetchState() {
  const res = await fetch(`${API}/state`);
  const state = await res.json();
  renderGrid(state.cells);
  updateStats(state);

  if (state.gameOver) {
    gameActive = false;
    handleGameOver(state);
  }
}

function renderGrid(cells) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cells.forEach(cell => {
    const div = document.createElement('div');
    div.className = 'cell';
    switch(cell.content) {
      case 'P': div.classList.add('player'); div.textContent = '⬟'; break;
      case 'H': div.classList.add('hunter'); div.textContent = '⬛'; break;
      case 'T': div.classList.add('target'); div.textContent = '✦'; break;
	  case 'I':
	      const types = {
	          'BONUS':     { icon: '💊', cls: 'item-bonus' },
	          'MALUS':     { icon: '☠', cls: 'item-malus' },
	          'FEU':       { icon: '🔥', cls: 'item-feu' },
	          'FRUITS':    { icon: '🍎', cls: 'item-fruits' },
	          'PREDATEUR': { icon: '🐺', cls: 'item-predateur' },
	      };
	      const t = types[cell.itemType] || types['BONUS'];
	      div.classList.add(t.cls);
	      div.textContent = t.icon;
	      break;
    }
    grid.appendChild(div);
  });
}

function updateStats(state) {
  // Energie joueur
  const pe = Math.max(0, state.playerEnergy);
  document.getElementById('player-energy').textContent = pe;
  document.getElementById('player-bar').style.width = Math.min(100, pe) + '%';
  if (pe < prevPlayerEnergy) addLog(`Bonhomme : ${prevPlayerEnergy} → ${pe} énergie`, pe < 20 ? 'danger' : 'new');
  prevPlayerEnergy = pe;

  // Energie chasseur
  const he = Math.max(0, state.hunterEnergy);
  document.getElementById('hunter-energy').textContent = he;
  document.getElementById('hunter-bar').style.width = Math.min(100, he) + '%';
  if (he < prevHunterEnergy) addLog(`Chasseur : ${prevHunterEnergy} → ${he} énergie`, 'new');
  prevHunterEnergy = he;

  document.getElementById('turn-display').textContent = state.turn;
}

function handleGameOver(state) {
    const overlay = document.getElementById('overlay');
    const title = document.getElementById('overlay-title');
    const msg = document.getElementById('overlay-msg');

    if (state.victory) {
        title.className = 'overlay-title victory';
        title.textContent = 'VICTOIRE';
        msg.textContent = 'Le bonhomme a atteint la cible !';
        addLog('Victoire !', 'success');
    } else {
        title.className = 'overlay-title defeat';
        title.textContent = 'DÉFAITE';
        msg.textContent = 'Partie terminée.';
        addLog('Défaite.', 'danger');
    }

    setTimeout(() => overlay.classList.add('show'), 800);
}
function addLog(msg, type = '') {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.textContent = `> ${msg}`;
  log.insertBefore(entry, log.firstChild);
  // Retire la classe 'new' après l'animation
  setTimeout(() => entry.classList.remove('new'), 1000);
}

document.addEventListener('keydown', (e) => {
  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    move(dir);
  }
});

// Auto-start
startGame();
</script>
</body>
</html>
